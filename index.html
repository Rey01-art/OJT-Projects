<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan Dela Cruz | TESDA SICAT Trainer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">
  <div class="card-header">
    <img src="images/tesda-banner.png" alt="TESDA Regional Training Center" class="banner-img">
  </div>

  <div class="profile-section">
    <div class="avatar">
      <img src="images/user.png" alt="Profile Photo">
    </div>
    <h2 class="fullname">Juan Dela Cruz</h2>
    <div class="badge">Trainer II</div>
    <p class="office">TESDA - SICAT Santiago City</p>
  </div>

  <div class="action-buttons">
    <a href="#" class="btn btn-call" onclick="handleContact(event)">
      <span class="btn-icon">📞</span>
      <span>Contact Number</span>
    </a>
    
    <a href="#" class="btn btn-email" onclick="openEmail(event)">
      <span class="btn-icon">✉️</span>
      <span>Email Address</span>
    </a>
    
    <a href="https://facebook.com/" target="_blank" rel="noopener" class="btn btn-social">
      <span class="btn-icon">🌐</span>
      <span>Facebook Profile</span>
    </a>
  </div>

  <div class="card-footer">
    <p>Santiago City, Isabela</p>
  </div>
</div>

<script>
// Phone number configuration
const userPhone = "+639123456789";
const userEmail = "juandelacruz@gmail.com";

// Toast notification
function showMessage(msg, isError = false) {
  let toast = document.querySelector('.custom-toast');
  if (toast) toast.remove();
  
  toast = document.createElement('div');
  toast.className = 'custom-toast';
  toast.innerHTML = `<span>${msg}</span>`;
  document.body.appendChild(toast);
  
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

// Copy to clipboard
function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showMessage(`✓ ${text} copied`))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.top = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  
  try {
    document.execCommand('copy');
    showMessage(`✓ ${text} copied`);
  } catch (err) {
    showMessage('❌ Unable to copy', true);
  }
  document.body.removeChild(textarea);
}

// Contact handler
function handleContact(e) {
  e.preventDefault();
  const action = confirm(`Call ${userPhone}?\n\nPress OK to call\nPress Cancel to copy number`);
  
  if (action) {
    window.location.href = `tel:${userPhone}`;
  } else {
    copyText(userPhone);
  }
}

// Email handler
function openEmail(e) {
  e.preventDefault();
  
  const subject = encodeURIComponent('Inquiry');
  const body = encodeURIComponent('Hello Juan,');
  const mailLink = `mailto:${userEmail}?subject=${subject}&body=${body}`;
  const gmailWeb = `https://mail.google.com/mail/?view=cm&fs=1&to=${userEmail}&su=${subject}&body=${body}`;
  
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  const isAndroid = /Android/i.test(navigator.userAgent);
  
  if (isMobile && isAndroid) {
    window.location.href = `intent://send?to=${userEmail}#Intent;scheme=mailto;package=com.google.android.gm;end;`;
    setTimeout(() => window.location.href = mailLink, 800);
  } else if (isMobile) {
    window.location.href = mailLink;
  } else {
    window.open(gmailWeb, '_blank');
  }
}
</script>

</body>
</html>
